<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow: hidden; background: #8ECAE6; font-family: system-ui, sans-serif; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#title-card {
  position: fixed; top: 20px; left: 20px;
  background: rgba(15,17,23,0.88); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 18px;
}
#title-card h1 { font-size: 15px; font-weight: 800; color: #f8fafc; }
#title-card p  { font-size: 10px; color: #64748b; margin-top: 3px; }
.label {
  position: absolute;
  background: rgba(15,17,23,0.9); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.13); border-radius: 8px;
  padding: 6px 11px; display: flex; align-items: center; gap: 7px;
  pointer-events: auto; white-space: nowrap; cursor: pointer;
  transform: translate(-50%, -100%) translateY(-10px);
}
.label:hover { background: rgba(30,35,50,0.95); }
.label span { font-size: 11px; font-weight: 700; color: #f1f5f9; }
.label .dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#legend {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(15,17,23,0.85); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  padding: 10px 18px; display: flex; gap: 18px;
}
.li { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
.ld { width: 8px; height: 8px; border-radius: 50%; }
#hint { position: fixed; bottom: 20px; right: 20px; color: #475569; font-size: 11px; }
#tooltip {
  position: fixed; display: none; z-index: 200;
  background: rgba(15,17,23,0.94); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 10px 14px; font-size: 11px; color: #94a3b8; max-width: 220px; line-height: 1.5;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="ui">
  <div id="title-card">
    <h1>My Projects</h1>
    <p id="status-line">Loading...</p>
  </div>
  <div id="legend">
    <div class="li"><div class="ld" style="background:#4ade80"></div>Running</div>
    <div class="li"><div class="ld" style="background:#fb923c"></div>No compose</div>
    <div class="li"><div class="ld" style="background:#f87171"></div>Error</div>
  </div>
  <div id="hint">scroll to zoom · drag to pan</div>
</div>
<div id="tooltip"></div>

<script src="three.min.js"></script>
<script>
try {
if (typeof THREE === 'undefined') throw new Error('three.min.js failed to load');

// ── SEEDED RANDOM (deterministic city fill)
let _s = 54321;
function rnd() { _s = (_s * 16807) % 2147483647; return (_s - 1) / 2147483646; }

// ── RENDERER + SCENE ─────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ECAE6);

const VIEW = 40;
const camera = new THREE.OrthographicCamera(-VIEW*(W/H), VIEW*(W/H), VIEW, -VIEW, 0.1, 600);
camera.position.set(60, 60, 60);
camera.lookAt(10, 0, -8);
camera.zoom = 0.82;
camera.updateProjectionMatrix();

// ── LIGHTING ─────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xCCDDFF, 1.1));
const sun = new THREE.DirectionalLight(0xFFF5E0, 2.6);
sun.position.set(40, 70, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 400;
sun.shadow.camera.left = -130; sun.shadow.camera.right = 130;
sun.shadow.camera.top  =  130; sun.shadow.camera.bottom = -130;
sun.shadow.camera.updateProjectionMatrix();
sun.shadow.bias = -0.001;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xAABBFF, 0.5);
fill.position.set(-30, 25, -15);
scene.add(fill);

// ── MATERIALS ─────────────────────────────────────────────────────
const M  = (c, r=0.82, m=0.06) => new THREE.MeshStandardMaterial({color:c, roughness:r, metalness:m});
const Mf = (c, r=0.82, m=0.06, f=0) => new THREE.MeshStandardMaterial(
  {color:c, roughness:r, metalness:m, polygonOffset:f!==0, polygonOffsetFactor:f, polygonOffsetUnits:f});

const MAT = {
  grass:    Mf(0x6DB855, 0.88, 0.02,  2),
  road:     Mf(0xB0B0B0, 0.82, 0.06, -1),
  sidewalk: Mf(0xD4CEC8, 0.82, 0.06, -1),
  tarmac:   Mf(0x52555C, 0.95, 0.04, -1),
  runway:   Mf(0x404448, 0.95, 0.02, -1),
  marking:  Mf(0xFFFFFF, 0.90, 0.00, -4),
  yellow:   Mf(0xF0C030, 0.90, 0.00, -4),
  water:    new THREE.MeshStandardMaterial({color:0x1E3A6E, roughness:0.08, metalness:0.3,
              transparent:true, opacity:0.88, polygonOffset:true, polygonOffsetFactor:-2, polygonOffsetUnits:-2}),
  glassT:   new THREE.MeshStandardMaterial({color:0xBAE6FD, roughness:0.1, metalness:0.35, transparent:true, opacity:0.72}),
  ghost:    new THREE.MeshStandardMaterial({color:0xC8D4DC, roughness:0.8, metalness:0.05, transparent:true, opacity:0.42}),
  roofM:    M(0xCDD8DF, 0.45, 0.3),
  // Exchange / Prediction Market
  exS: M(0x8B5CF6), exE: M(0x6D28D9), exT: M(0xC4B5FD), exCol: M(0xA78BFA), exPed: M(0xDDD6FE),
  // Club / DJ Website
  clS: M(0xEC4899), clE: M(0xBE185D), clT: M(0xF9A8D4),
  // Home / Personal Website
  hmS: M(0x10B981), hmE: M(0x059669), hmT: M(0xA7F3D0),
  // Airport
  twrS: M(0x38BDF8, 0.38, 0.12), twrT: M(0xBAE6FD, 0.28, 0.2),
  pier: M(0xC8D4DA, 0.6, 0.1),
  termS: M(0xCDD8DE, 0.55, 0.1), termE: M(0xC0CCD4, 0.55, 0.1),
  beacon: M(0xEF4444, 0.3, 0.5),
  // Palettes for city fill
  OFF:  [M(0xB0B8C8), M(0x9FAEBC), M(0xC2C8D2), M(0x8A98A8), M(0x6B7280), M(0x94A3B8)],
  RESI: [M(0xDDC8A8), M(0xCCB898), M(0xE8D4B4), M(0xFDE68A), M(0xFCA5A5), M(0xDDD6FE), M(0xB8C8A0)],
  ENT:  [M(0xF87171), M(0xFB923C), M(0xFBBF24), M(0xA78BFA), M(0x4ADE80)],
  IND:  [M(0x78716C), M(0x6B7280), M(0x57534E), M(0x92400E)],
  DOCK: [M(0x6B7280), M(0x78716C), M(0x52525B)],
};

// ── HELPERS ───────────────────────────────────────────────────────
function box(w,h,d, mat, x,y,z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function mbox(w,h,d, mats, x,y,z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mats);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function gnd(w,d, mat, x,z, y=0) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d), mat);
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z); m.receiveShadow=true; scene.add(m); return m;
}
function cyl(rt,rb,h,seg, mat, x,y,z) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
}
function sph(r,mat,x,y,z) {
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,8,8),mat);
  m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m;
}
function tree(x,z,s=1) {
  cyl(0.14*s,0.20*s,1.2*s,6, M(0x7B5533), x,0.6*s,z);
  const c1=new THREE.Mesh(new THREE.ConeGeometry(1.2*s,2.2*s,7), M(0x348A34));
  c1.position.set(x,2.1*s,z); c1.castShadow=true; scene.add(c1);
  const c2=new THREE.Mesh(new THREE.ConeGeometry(0.8*s,1.6*s,7), M(0x4CAF4C));
  c2.position.set(x,3.5*s,z); c2.castShadow=true; scene.add(c2);
}
function fill_district(cx,cz, cols,rows, step, hMin,hMax, mats, exX,exZ,exR) {
  for(let c=0;c<cols;c++) for(let r=0;r<rows;r++) {
    const bx = cx-(cols-1)*step/2+c*step, bz = cz-(rows-1)*step/2+r*step;
    if(Math.abs(bx-exX)<exR && Math.abs(bz-exZ)<exR) continue;
    const bw=step*0.60+rnd()*step*0.22, bd=step*0.60+rnd()*step*0.22;
    const bh=hMin+rnd()*(hMax-hMin);
    box(bw,bh,bd, mats[Math.floor(rnd()*mats.length)], bx,bh/2,bz);
  }
}

// ── GROUND ────────────────────────────────────────────────────────
gnd(210, 210, MAT.grass, 0, -5);

// ── ROAD NETWORK ──────────────────────────────────────────────────
// N–S Boulevards (5 wide)
[[-44,-2],[-22,-2],[0,-2],[22,-2],[44,-8]].forEach(([x,cz])=> gnd(5,130,MAT.road,x,cz));
gnd(5,46,MAT.road,66,-33); // East Bypass (north half)

// E–W Boulevards (5 deep)
gnd(155,5,MAT.road, 8,-44); // North Ring
gnd(155,5,MAT.road, 8,-22); // Airport Blvd
gnd(155,5,MAT.road, 8,  0); // Main Street
gnd(110,5,MAT.road, 0, 22); // South Blvd
gnd( 92,5,MAT.road,-2, 44); // Southern Ring

// Secondary streets (3 wide)
gnd( 3,22,MAT.road,-33,-33); gnd(22, 3,MAT.road,-33,-33); // Finance block
gnd( 3,22,MAT.road, 11,-33);                               // CBD N–S
gnd(22, 3,MAT.road,-33, 11);                               // Entertainment E–W
gnd( 3,22,MAT.road, 11, 33); gnd( 3,22,MAT.road,33,33);   // Residential N–S
gnd(46, 3,MAT.road, 12, 33);                               // Residential E–W
gnd(44, 3,MAT.road, 44, 11); gnd( 3,44,MAT.road,55, 0);   // Tech
gnd(44, 3,MAT.road,-33, 33);                               // Port/Res

// Road centre-line dashes (N–S boulevards)
[-44,-22,0,22,44].forEach(bx => {
  for(let z=-62;z<54;z+=5) gnd(0.14,2.8,MAT.marking,bx,z);
});
// Road centre-line dashes (E–W boulevards)
[-44,-22,0,22,44].forEach(bz => {
  for(let x=-68;x<82;x+=5) gnd(2.8,0.14,MAT.marking,x,bz);
});

// ── AIRPORT COMPLEX ────────────────────────────────────────────────
// Main tarmac apron
gnd(58,26,MAT.tarmac, 48,-35);
gnd(56, 8,MAT.tarmac, 48,-48); // apron bridge to runways

// Terminal body (40w × 10d × 6h, center x=44, z=-32)
mbox(40,6,10,
  [MAT.termS,MAT.termE,MAT.roofM,MAT.roofM,MAT.termS,MAT.termE],
  44,3,-32);
// Glass curtain south face
box(40,3,0.3,MAT.glassT, 44,1.5,-26.85);
// Entry canopy
box(9,0.4,4,M(0x94A3B8,0.4,0.2), 36,6.4,-25.5);
[[31.5,-26.4],[40.5,-26.4]].forEach(([x,z])=>box(0.3,6.4,0.3,M(0x94A3B8,0.7),x,3.2,z));

// Barrel-vault arches (7 sections over 40-unit terminal)
for(let i=0;i<7;i++){
  const g=new THREE.CylinderGeometry(2.4,2.4,5.6,18,1,false,Math.PI*0.85,Math.PI*1.3);
  const v=new THREE.Mesh(g,MAT.roofM);
  v.position.set(25+i*6.65,7.1,-32); v.rotation.z=Math.PI/2; v.castShadow=true; scene.add(v);
}

// Airport Hotel (west end)
mbox(8,12,8,
  [M(0xE8D4B0),M(0xD9C8A4),M(0xEDE0C4),M(0xD9C8A4),M(0xE8D4B0),M(0xD9C8A4)],
  24,6,-30);
// Hotel skybridge to terminal
box(6,1,1.4,M(0xC4CDD4,0.6,0.1), 28.5,5,-28.5);

// West concourse bridge + gate piers
box(14,1.4,2,M(0xC4CDD4,0.6,0.1), 33,4.7,-25.5);
[27,34,41].forEach(px=>{
  box(5,4,11,MAT.pier, px,2,-20);
  box(5,3,0.3,MAT.glassT, px,1.5,-14.35);
  // Aircraft
  box(1,0.25,13,M(0xF0F4F8,0.55), px,0.13,-15); box(18,0.25,1,M(0xF0F4F8,0.55), px,0.13,-15);
  box(4,0.18,0.7,M(0xE8ECF0,0.6), px,0.1,-20.8);
});

// East concourse bridge + gate piers
box(18,1.4,2,M(0xC4CDD4,0.6,0.1), 57,4.7,-25.5);
[51,58,65].forEach(px=>{
  box(5,4,11,MAT.pier, px,2,-20);
  box(5,3,0.3,MAT.glassT, px,1.5,-14.35);
  box(1,0.25,13,M(0xF0F4F8,0.55), px,0.13,-15); box(18,0.25,1,M(0xF0F4F8,0.55), px,0.13,-15);
  box(4,0.18,0.7,M(0xE8ECF0,0.6), px,0.1,-20.8);
});

// Taxiways
gnd(2.5,26,MAT.tarmac,34,-38); gnd(2.5,26,MAT.tarmac,54,-38);
for(let z=-24;z>-51;z-=5){ gnd(0.18,3.0,MAT.yellow,34,z); gnd(0.18,3.0,MAT.yellow,54,z); }

// Runway A
gnd(58,5,MAT.runway, 48,-50);
for(let x=22;x<77;x+=4.5) gnd(2.8,0.18,MAT.marking,x,-50);
gnd(2,5,MAT.marking,22,-50); gnd(2,5,MAT.marking,76,-50);

// Runway B
gnd(58,5,MAT.runway, 48,-59);
for(let x=22;x<77;x+=4.5) gnd(2.8,0.18,MAT.marking,x,-59);
gnd(2,5,MAT.marking,22,-59); gnd(2,5,MAT.marking,76,-59);

// Control tower
box(2.5,28,2.5,MAT.twrS, 72,14,-30);
box(7,1.5,7,M(0x7DD3FC,0.28,0.22), 72,28.8,-30);
box(2.5,1.4,2.5,MAT.twrT, 72,30.2,-30);
sph(0.4,MAT.beacon, 72,31.2,-30);

// Fuel farm
[[67,-42],[70,-42],[67,-45],[70,-45]].forEach(([x,z])=>cyl(1.8,1.8,4,12,M(0x778899,0.7,0.1),x,2,z));
// Runway aircraft
[[36,-44.5],[54,-59]].forEach(([x,z])=>{
  box(0.9,0.28,11,M(0xF0F4F8,0.55),x,0.15,z);
  box(15,0.28,1,M(0xF0F4F8,0.55),x,0.15,z);
});
// Airport perimeter trees
[24,30,36,42,48,54,60,66].forEach(x=>tree(x,-63,0.7));

// ── FINANCIAL DISTRICT ────────────────────────────────────────────
// Exchange Building (Prediction Market) — center (-31, -33)
mbox(11,13,7,[MAT.exS,MAT.exE,MAT.exT,MAT.exT,MAT.exS,MAT.exE], -31,6.5,-33);
// 6 columns south face
[-34.5,-33,-31.5,-30,-28.5,-27].forEach(cx=>
  cyl(0.38,0.38,11,12,MAT.exCol, cx,5.5,-29.15));
// Pediment
box(12.4,0.6,1.8,MAT.exPed, -31,13.6,-29.15);
// Steps
box(12,0.35,2.2,M(0xEDE9FE,0.9),-31,0.18,-28.0);
box(11,0.35,1.2,M(0xEDE9FE,0.9),-31,0.55,-28.8);
// Side wings
mbox(4,9,5,[MAT.exS,MAT.exE,MAT.exT,MAT.exT,MAT.exS,MAT.exE], -37.5,4.5,-33);
mbox(4,9,5,[MAT.exS,MAT.exE,MAT.exT,MAT.exT,MAT.exS,MAT.exE], -24.5,4.5,-33);

// Finance filler buildings around Exchange
fill_district(-33,-33, 3,3, 8, 8,17, MAT.OFF, -31,-33, 9);
// Extended finance block (NW)
fill_district(-33,-39, 3,2, 8, 8,16, MAT.OFF, 999,999, 0);
// Key named finance towers
box(5,17,5,M(0x4B5563,0.7,0.1), -36,-0+8.5,-39);  // North Capital
box(6,13,5,M(0xB08D57,0.7,0.05),-36,-0+6.5,-28);  // Trust House
box(5,15,5,M(0x1E3A5F,0.4,0.25),-25,-0+7.5,-39);  // Atlas Building
box(5,11,5,M(0x3B82F6,0.5,0.2), -25,-0+5.5,-28);  // Prospect Tower

// Finance district trees
[-42,-38,-34,-30,-26].forEach(x=>tree(x,-44,0.8));

// ── CENTRAL BUSINESS DISTRICT ─────────────────────────────────────
// Pinnacle Tower (tallest, with spire)
box(5,24,5,M(0x1D4ED8,0.35,0.25), -5,12,-36);
cyl(0.4,0,4,8,M(0x93C5FD,0.4,0.2), -5,26.5,-36);
// Meridian Plaza
box(6,20,6,M(0x1F2937,0.7,0.08), 8,10,-36);
box(6,6,6,MAT.glassT, 8,23,-36); // glass crown
// Commerce Centre
box(7,16,5,M(0x374151,0.72,0.08), 8,8,-28);
// Exchange Annex
box(8,13,5,M(0x9CA3AF,0.75,0.06), -5,6.5,-28);
// East tower
box(5,18,5,M(0x0F766E,0.4,0.2), -5,9,-42);
// CBD mid-rise fill
fill_district(4,-33, 4,2, 7, 6,12, MAT.OFF, 999,999, 0);
// Reflecting pool
gnd(6,4,new THREE.MeshStandardMaterial({color:0x38BDF8,roughness:0.05,metalness:0.4,
  transparent:true,opacity:0.7,polygonOffset:true,polygonOffsetFactor:-2,polygonOffsetUnits:-2}), 2,-32);
// CBD trees
[[2,-32]].forEach(([x,z])=>{[-3,0,3].forEach(dx=>tree(x+dx,z,0.85))});

// ── INDUSTRIAL DISTRICT ───────────────────────────────────────────
// Factory A
mbox(14,7,10,[M(0x78350F),M(0x6B2D0B),M(0x92400E),M(0x6B2D0B),M(0x78350F),M(0x92400E)], -52,3.5,-38);
box(14,0.5,0.5,M(0x6B2D0B,0.9),-52,7.6,-38); // roof ridge
cyl(0.9,0.7,15,8,M(0x57534E,0.9),-48,7.5,-35);
// Factory B
mbox(10,6,8,[M(0x71717A),M(0x52525B),M(0xA1A1AA),M(0x52525B),M(0x71717A),M(0xA1A1AA)], -52,3,-28);
cyl(0.7,0.6,12,8,M(0x57534E,0.9),-50,6,-25);
// Warehouse row
fill_district(-52,-10, 2,2, 12, 4,6, MAT.IND, 999,999,0);
// Rail boxcars
box(6,2.5,2.5,M(0xDC2626,0.8),-55,-0+1.25,-20);
box(6,2.5,2.5,M(0x1D4ED8,0.8),-50,-0+1.25,-20);
// Rail lines
gnd(16,0.15,MAT.marking,-50,-20); gnd(16,0.15,MAT.marking,-50,-21.2);

// ── ENTERTAINMENT QUARTER ─────────────────────────────────────────
// DJ Club (DJ Website) — center (-31, 11)
mbox(9,12,7,[MAT.clS,MAT.clE,MAT.clT,MAT.clT,MAT.clS,MAT.clE], -31,6,11);
// Art deco vertical fins (8)
for(let i=0;i<8;i++) box(0.35,12,0.5,MAT.clE, -35+i*1.14,6,7.65);
// Marquee canopy
box(10,0.45,2.5,M(0xF472B6,0.7),-31,8.7,7.5);
// Sign panel
box(4.5,1.3,0.2,M(0xFDE68A,0.5),-31,7.2,7.47);
// Door
box(2,3.5,0.2,M(0x831843,0.9),-31,1.75,7.47);
// Neon corner tubes
[[-35.5,7.5],[-35.5,14.5],[-26.5,7.5],[-26.5,14.5]].forEach(([cx,cz])=>
  box(0.18,12,0.18,M(0xFF00AA,0.3,0.4),cx,6,cz));
// Entertainment filler
fill_district(-33,-5, 3,2, 9, 4,9, MAT.ENT, 999,999,0); // Grand Theater area
fill_district(-33,11, 3,3, 8, 3,7, MAT.ENT, -31,11,10); // Around club
fill_district(-33,22, 3,2, 8, 2,5, MAT.RESI,999,999,0); // Transition to residential
// Entertainment trees
[-44,-40,-36,-32,-28,-24].forEach(x=>tree(x,11,0.75));

// ── CIVIC & MIDTOWN ───────────────────────────────────────────────
// City Hall
mbox(12,9,9,[M(0xFEF9C3),M(0xFEF08A),M(0xFEF9C3),M(0xFEF08A),M(0xFEF9C3),M(0xFDE047)], 0,4.5,8);

// World positions for building label anchors
const BUILDING_MAP = {
  'flight-finder':     { anchor: new THREE.Vector3(44, 13, -32),  url_port: 3001 },
  'prediction-market': { anchor: new THREE.Vector3(-31, 17, -33), url_port: 3003 },

const DOT_COLOR = {
  running:         '#4ade80',
  no_compose_file: '#fb923c',
  no_dockerfile:   '#fb923c',
  clone_failed:    '#f87171',
  build_failed:    '#f87171',
  run_failed:      '#f87171',
  not_started:     '#475569',
};

const STATUS_MSG = {
  no_compose_file: 'Add a docker-compose.yml to this repo, then re-run setup.py.',
  no_dockerfile:   'Add a docker-compose.yml to this repo, then re-run setup.py.',
  clone_failed:    'Git clone failed — check the URL in repos.json.',
  build_failed:    'Docker build failed — check the compose file.',
  run_failed:      'Container failed to start — check docker logs.',
};

const labelEls = {};
const labelData = {};

function buildLabel(name, label, dotColor) {
  const el = document.createElement('div');
  el.className = 'label';
  el.innerHTML = `<div class="dot" style="background:${dotColor}"></div><span>${label}</span>`;
  document.getElementById('ui').appendChild(el);
  return el;
}

const tooltip = document.getElementById('tooltip');
function showTip(msg, x, y) {
  tooltip.textContent = msg;
  tooltip.style.display = 'block';
  tooltip.style.left = (x+12)+'px';
  tooltip.style.top  = (y-10)+'px';
}
function hideTip() { tooltip.style.display = 'none'; }

const host = window.location.hostname;

Promise.all([
  fetch('/repos.json').then(r=>r.ok?r.json():[]).catch(()=>[]),
  fetch('/projects.json').then(r=>r.ok?r.json():[]).catch(()=>[]),
]).then(([repos, statuses]) => {
  // Merge: repos is source of truth for project list, statuses adds runtime info
  const statusMap = Object.fromEntries(statuses.map(s=>[s.name, s]));
  const projects = repos.map(r => ({ ...r, status: 'not_started', ...(statusMap[r.name]||{}) }));

  const running = projects.filter(p=>p.status==='running').length;
  document.getElementById('status-line').textContent =
    `${projects.length} projects · ${running} running · re-run setup.py to refresh`;

    // Build labels for known buildings
    for(const [name, bld] of Object.entries(BUILDING_MAP)) {
      const proj = projects.find(p=>p.name===name);
      const label = proj ? (proj.label||name) : name.replace(/-/g,' ');
      const dot   = proj ? (DOT_COLOR[proj.status]||'#64748b') : '#64748b';
      const el = buildLabel(name, label, dot);
      labelEls[name] = el;
      labelData[name] = { anchor: bld.anchor, proj };

      el.addEventListener('click', e => {
        e.stopPropagation();
        if(proj && proj.status === 'running') {
          window.open(`http://${host}:${proj.port}`, '_blank');
        } else if(proj) {
          const msg = STATUS_MSG[proj.status] || proj.error || 'Unknown status.';
          showTip(msg, e.clientX, e.clientY);
          setTimeout(hideTip, 4000);
        }
      });
    }
  });

document.addEventListener('click', hideTip);

// ── CAMERA CONTROLS ───────────────────────────────────────────────
let drag=false, lx=0, lz=0, panX=10, panZ=-8;
renderer.domElement.addEventListener('mousedown', e=>{drag=true; lx=e.clientX; lz=e.clientY;});
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  panX -= (e.clientX-lx)*0.08; panZ -= (e.clientY-lz)*0.08;
  lx=e.clientX; lz=e.clientY;
});
renderer.domElement.addEventListener('wheel', e=>{
  e.preventDefault();
  camera.zoom = Math.max(0.2, Math.min(5, camera.zoom - e.deltaY*0.0008));
  camera.updateProjectionMatrix();
  camera.position.set(60+panX,60,60+panZ); camera.lookAt(panX,0,panZ);
  renderer.render(scene, camera);
},{passive:false});
window.addEventListener('resize',()=>{
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.left=-VIEW*(w/h); camera.right=VIEW*(w/h);
  camera.updateProjectionMatrix();
});

// ── RENDER LOOP ───────────────────────────────────────────────────
const _v = new THREE.Vector3();
function toScreen(pos) {
  _v.copy(pos).project(camera);
  return { x:(_v.x+1)/2*window.innerWidth, y:(-_v.y+1)/2*window.innerHeight };
}

(function animate(){
  requestAnimationFrame(animate);
  camera.position.set(60+panX, 60, 60+panZ);
  camera.lookAt(panX, 0, panZ);
  renderer.render(scene, camera);
  for(const [name, el] of Object.entries(labelEls)) {
    const s = toScreen(labelData[name].anchor);
    el.style.left = s.x+'px';
    el.style.top  = s.y+'px';
  }
})();

} catch(e) {
  const pre = document.createElement('pre');
  pre.style.cssText='position:fixed;top:10px;left:10px;background:#900;color:#fff;padding:12px;border-radius:8px;z-index:9999;font-size:11px;white-space:pre-wrap;max-width:90vw';
  pre.textContent = e+'\n'+(e.stack||'');
  document.body.appendChild(pre);
}
</script>

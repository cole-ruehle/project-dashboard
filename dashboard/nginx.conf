server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /projects.json {
        add_header Content-Type application/json;
    }

    location /api/ {
        proxy_pass http://dashboard-api:5001;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
